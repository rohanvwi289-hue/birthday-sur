<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My Love</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #fff0f5 0%, #ffdee9 50%, #ffe4e1 100%);
      color: #4a4a4a;
    }
    .font-love { font-family: 'Pacifico', cursive; }

    .heart { position: fixed; bottom: -40px; color: rgba(255, 105, 180, 0.6); animation: floatHeart linear infinite; z-index: 1; pointer-events: none; }
    @keyframes floatHeart { 0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(-115vh) rotate(360deg) scale(1.8); opacity: 0; } }

    .step { display: none; animation: popIn .8s ease forwards; }
    .step.active { display: block; }
    @keyframes popIn { from { opacity: 0; transform: translateY(35px) scale(.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 25px 50px rgba(255, 182, 193, 0.3); }

    .gift-box { width: 150px; height: 115px; background: linear-gradient(135deg, #ff8da1, #ffb7c5); border-radius: 18px; position: relative; margin: 0 auto; animation: bounceGift 1.5s infinite; cursor: pointer; box-shadow: 0 20px 45px rgba(255, 105, 180, .2); }
    .gift-box::before { content: ''; position: absolute; width: 28px; height: 115px; background: #fff4b8; left: 61px; top: 0; }
    .gift-box::after { content: ''; position: absolute; width: 170px; height: 28px; background: #fff4b8; left: -10px; top: 42px; }
    .gift-lid { width: 175px; height: 38px; background: linear-gradient(135deg, #ff758c, #ff9aa2); border-radius: 16px; position: absolute; top: -35px; left: -12px; transition: .5s ease; }
    .gift-box.open .gift-lid { transform: rotate(-25deg) translate(-35px, -45px); }
    @keyframes bounceGift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    .cake { position: relative; width: 210px; height: 135px; margin: 0 auto; }
    .cake-base { position: absolute; bottom: 0; width: 210px; height: 85px; background: linear-gradient(180deg, #ffb7c5, #ff8da1); border-radius: 18px 18px 28px 28px; }
    .cake-top { position: absolute; bottom: 70px; width: 210px; height: 40px; background: #fff7fb; border-radius: 50%; }
    .candle { position: absolute; bottom: 105px; left: 96px; width: 18px; height: 45px; background: repeating-linear-gradient(45deg, #fff, #fff 6px, #ffb7c5 6px, #ffb7c5 12px); border-radius: 8px; }
    .flame { position: absolute; bottom: 146px; left: 95px; width: 20px; height: 30px; background: radial-gradient(circle, #fffdf0 20%, #ffd700 60%, #ff8c00 100%); border-radius: 50%; animation: flame .25s infinite alternate; cursor: pointer; }
    @keyframes flame { from { transform: scale(1) rotate(-3deg); } to { transform: scale(1.15) rotate(3deg); } }

    .confetti { position: fixed; top: -20px; width: 10px; height: 16px; animation: confettiFall 3s linear forwards; z-index: 40; }
    @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    .shake { animation: shake .45s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <main class="relative z-10 w-full max-w-3xl">
    <div class="glass rounded-[2rem] p-8 text-center min-h-[580px] flex items-center justify-center">
      
      <section class="step active w-full" data-step="0">
        <h1 class="font-love text-6xl text-pink-600 mb-6">Hey Beautiful</h1>
        <p class="text-xl text-gray-700 mb-8">Today is the day my favorite person came into this world.</p>
        <button onclick="nextStep()" class="bg-pink-400 text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-pink-500 transition">Open Surprise 💝</button>
      </section>

      <section class="step w-full" data-step="1">
        <h2 class="font-love text-5xl text-pink-600 mb-4">Catch my heart!</h2>
        <div class="relative h-64 bg-white/20 rounded-3xl border border-white/50" id="heartGame">
          <button id="catchHeart" class="absolute text-5xl transition-all">💖</button>
          <div class="absolute top-4 left-4 bg-white/50 px-4 py-1 rounded-full text-sm">Caught: <span id="score">0</span>/5</div>
        </div>
      </section>

      <section class="step w-full" data-step="2">
        <h2 class="font-love text-5xl text-pink-600 mb-4">A Gift For You</h2>
        <div class="gift-box" onclick="openGift(this)"><div class="gift-lid"></div></div>
        <p id="giftMessage" class="hidden mt-10 text-2xl font-bold text-pink-500 animate-pulse">My love and prayers are for you always. 🥺❤️</p>
      </section>

      <section class="step w-full" data-step="3">
        <div class="cake mb-8"><div class="flame" id="flame" onclick="blowCandle()"></div><div class="candle"></div><div class="cake-top"></div><div class="cake-base"></div></div>
        <button onclick="blowCandle()" class="bg-pink-400 text-white px-8 py-4 rounded-full font-bold hover:bg-pink-500 transition">Blow Candle 🕯️</button>
      </section>

      <section class="step w-full" data-step="4">
        <h2 class="font-love text-5xl text-pink-600 mb-6">Happy Birthday! 🎂</h2>
        <p class="text-lg text-gray-700">May Allah bless you with endless happiness, health, and success. I am so lucky to have you. ❤️</p>
        <button onclick="location.reload()" class="mt-8 bg-white text-pink-500 px-6 py-3 rounded-full font-bold shadow hover:bg-pink-50">Replay ✨</button>
      </section>
    </div>
  </main>

  <script>
    let currentStep = 0; let score = 0;
    const steps = document.querySelectorAll('.step');
    function nextStep() { steps[currentStep].classList.remove('active'); currentStep++; steps[currentStep].classList.add('active'); if(currentStep===1) moveHeart(); }
    
    function moveHeart() { const btn = document.getElementById('catchHeart'); btn.style.left = Math.random()*200 + 'px'; btn.style.top = Math.random()*150 + 'px'; }
    document.getElementById('catchHeart').addEventListener('click', () => { score++; document.getElementById('score').innerText = score; if(score>=5) nextStep(); else moveHeart(); });
    
    function openGift(box) { box.classList.add('open'); document.getElementById('giftMessage').classList.remove('hidden'); setTimeout(nextStep, 2000); }
    function blowCandle() { document.getElementById('flame').style.display='none'; setTimeout(nextStep, 1000); }
  </script>
</body>
</html>
